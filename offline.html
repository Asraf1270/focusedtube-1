<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - FocusedTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f8fafc;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 400px;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #0f172a;
            margin-bottom: 10px;
        }
        
        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            background: #f59e0b;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }
        
        .cached-videos {
            text-align: left;
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        
        .cached-videos h3 {
            font-size: 16px;
            color: #0f172a;
            margin-bottom: 10px;
        }
        
        .cached-video {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .cached-video:last-child {
            border-bottom: none;
        }
        
        .cached-video img {
            width: 60px;
            height: 34px;
            border-radius: 4px;
            object-fit: cover;
        }
        
        .cached-video .info {
            flex: 1;
        }
        
        .cached-video .title {
            font-size: 13px;
            font-weight: 500;
            color: #0f172a;
        }
        
        .cached-video .channel {
            font-size: 11px;
            color: #94a3b8;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #FF0000;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #cc0000;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #0f172a;
        }
        
        .btn-secondary:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <div class="status">Offline Mode</div>
        <h1>You're Offline</h1>
        <p>
            Don't worry! You can still watch videos you've previously loaded.
            Connect to the internet to discover new content.
        </p>
        
        <button class="btn" onclick="retryConnection()">🔄 Try Again</button>
        <br><br>
        <a href="/" class="btn btn-secondary">🏠 Go Home</a>
        
        <div class="cached-videos" id="cachedVideos">
            <h3>📹 Available Offline</h3>
            <p style="font-size: 13px; color: #94a3b8;">
                Videos you've watched will appear here for offline viewing.
            </p>
        </div>
    </div>
    
    <script>
        // Try to reconnect
        function retryConnection() {
            if (navigator.onLine) {
                window.location.href = '/';
            } else {
                alert('Still offline. Please check your internet connection.');
            }
        }
        
        // Check connection status
        window.addEventListener('online', () => {
            window.location.href = '/';
        });
        
        // Load cached videos
        if ('caches' in window) {
            caches.open('focusedtube-v1').then(cache => {
                // This would need to be implemented to show cached videos
                console.log('Cache available for offline viewing');
            });
        }
    </script>
</body>
</html>
